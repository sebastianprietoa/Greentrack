{% extends "base.html" %}

{% block title %}Agua - GreenTrack{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 6rem auto; text-align: center; padding: 2rem;">
    <div style="background: white; padding: 3rem 2.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid #3B82F6;">
        <div style="width: 80px; height: 80px; background: #EFF6FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
            <i class="fas fa-tint" style="font-size: 2rem; color: #3B82F6;"></i>
        </div>
        <h1 style="margin: 0 0 0.75rem 0; color: #111827; font-size: 2rem;">Próximamente</h1>
        <p style="color: #6B7280; font-size: 1rem; line-height: 1.6; margin: 0 0 2rem 0;">
            El módulo de <strong>Emisiones al Agua</strong> está en desarrollo.<br>
            Estará disponible en una próxima versión de la plataforma.
        </p>
        <a href="{{ url_for('dashboard') }}" style="background: #3B82F6; color: white; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>
    </div>
</div>
{% endblock %}
